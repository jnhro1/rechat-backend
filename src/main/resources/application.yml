spring:
  application:
    name: rechat-backend

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/rechat?serverTimezone=UTC&characterEncoding=UTF-8}
    username: ${DB_USERNAME:rechat}
    password: ${DB_PASSWORD:rechat}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: rechat-pool
      maximum-pool-size: ${DB_POOL_SIZE:10}
      connection-timeout: 3000

  jpa:
    hibernate:
      # FYI: 스키마 소유권은 Flyway가 갖는다. 운영에선 validate로 엔티티-스키마 정합성만 검증.
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: true

# Actuator: 헬스 체크/메트릭 (관측 가능성)
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  default-produces-media-type: application/json

logging:
  level:
    com.jnhro1.rechatbackend: DEBUG

---
# 로컬 개발 프로파일: SQL 로그 출력
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    show-sql: true
